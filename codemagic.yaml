workflows:
  waypoint-unsigned:
    name: Waypoint unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.0

    # Only the owner-gated GitHub Action updates this dedicated branch.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: codemagic-build
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Install XcodeGen
        script: |
          set -euo pipefail

          if ! command -v xcodegen >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          fi

          xcodegen --version
          xcodebuild -version

      - name: Fetch pinned idevice library
        script: |
          set -euo pipefail
          bash scripts/fetch-idevice.sh

      - name: Verify location simulation support
        script: |
          set -euo pipefail
          LC_ALL=C grep -a -q '_location_simulation_new' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_set' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_clear' Vendor/idevice/libidevice_ffi.a

      - name: Generate Xcode project
        script: |
          set -euo pipefail
          xcodegen generate --spec project.yml
          test -d Waypoint.xcodeproj

      - name: Archive without signing
        script: |
          set -euo pipefail

          rm -rf "$CM_BUILD_DIR/build"
          mkdir -p "$CM_BUILD_DIR/build"

          set -o pipefail
          xcodebuild clean archive \
            -project Waypoint.xcodeproj \
            -scheme Waypoint \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/Waypoint.xcarchive" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee "$CM_BUILD_DIR/build/xcodebuild.log"

      - name: Package unsigned IPA
        script: |
          set -euo pipefail

          app_path="$CM_BUILD_DIR/build/Waypoint.xcarchive/Products/Applications/Waypoint.app"
          test -d "$app_path"

          rm -rf "$CM_BUILD_DIR/Payload"
          rm -f "$CM_BUILD_DIR/Waypoint-unsigned.ipa"
          mkdir -p "$CM_BUILD_DIR/Payload"

          ditto "$app_path" "$CM_BUILD_DIR/Payload/Waypoint.app"

          cd "$CM_BUILD_DIR"
          ditto -c -k --sequesterRsrc --keepParent \
            Payload \
            Waypoint-unsigned.ipa

          test -s Waypoint-unsigned.ipa
          shasum -a 256 Waypoint-unsigned.ipa

    artifacts:
      - Waypoint-unsigned.ipa
      - build/xcodebuild.log
