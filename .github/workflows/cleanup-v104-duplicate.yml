name: Clean legacy duplicate IPA

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-v104-duplicate.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.repository_owner == 'raph559' && github.actor == 'raph559'
    runs-on: ubuntu-latest

    steps:
      - name: Verify and delete redundant v1.0.4 asset
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: v1.0.4
          CANONICAL_NAME: Waypoint-iOS26-unsigned.ipa
          REDUNDANT_NAME: Waypoint-iOS26-v1.0.4-unsigned.ipa
          REDUNDANT_ASSET_ID: '484595673'
        run: |
          set -euo pipefail

          release="$(gh api "repos/$REPOSITORY/releases/tags/$RELEASE_TAG")"
          canonical_id="$(jq -r --arg name "$CANONICAL_NAME" '.assets[] | select(.name == $name) | .id' <<< "$release")"
          redundant_id="$(jq -r --arg name "$REDUNDANT_NAME" '.assets[] | select(.name == $name) | .id' <<< "$release")"
          canonical_digest="$(jq -r --arg name "$CANONICAL_NAME" '.assets[] | select(.name == $name) | .digest' <<< "$release")"
          redundant_digest="$(jq -r --arg name "$REDUNDANT_NAME" '.assets[] | select(.name == $name) | .digest' <<< "$release")"

          test -n "$canonical_id"
          test "$redundant_id" = "$REDUNDANT_ASSET_ID"
          test -n "$canonical_digest"
          test "$canonical_digest" = "$redundant_digest"

          gh api --method DELETE "repos/$REPOSITORY/releases/assets/$REDUNDANT_ASSET_ID"

          remaining="$(gh api "repos/$REPOSITORY/releases/tags/$RELEASE_TAG")"
          test "$(jq '[.assets[] | select(.name | endswith(".ipa"))] | length' <<< "$remaining")" -eq 1
          test "$(jq -r '.assets[] | select(.name | endswith(".ipa")) | .name' <<< "$remaining")" = "$CANONICAL_NAME"
