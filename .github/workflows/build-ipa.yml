name: Build unsigned IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish or update the GitHub Release for the app version
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch location-enabled idevice binary
        run: bash scripts/fetch-idevice.sh

      - name: Verify location-simulation symbols
        run: |
          LC_ALL=C grep -a -q '_location_simulation_new' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_set' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_clear' Vendor/idevice/libidevice_ffi.a

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive without signing
        run: |
          xcodebuild clean archive \
            -project Waypoint.xcodeproj \
            -scheme Waypoint \
            -configuration Release \
            -archivePath build/Waypoint.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          test -d build/Waypoint.xcarchive/Products/Applications/Waypoint.app
          rm -rf Payload
          mkdir -p Payload
          ditto build/Waypoint.xcarchive/Products/Applications/Waypoint.app Payload/Waypoint.app
          ditto -c -k --sequesterRsrc --keepParent Payload Waypoint-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Waypoint-unsigned-ipa
          path: Waypoint-unsigned.ipa
          retention-days: 30

  release:
    name: publish release
    needs: build
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' &&
          startsWith(github.event.head_commit.message, 'Release Waypoint ')) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out release metadata
        uses: actions/checkout@v4

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: Waypoint-unsigned-ipa

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' project.yml)"
          test -n "$version"

          tag="v$version"
          asset="Waypoint-iOS26-$tag-unsigned.ipa"
          mv Waypoint-unsigned.ipa "$asset"

          checksum="$(sha256sum "$asset" | awk '{ print $1 }')"
          notes="$(mktemp)"
          printf '%s\n' \
            "## Waypoint $version" \
            "" \
            "The current unsigned iOS 26 build of Waypoint for SideStore." \
            "" \
            "### Highlights" \
            "" \
            "- Guided Start on mobile data with automatic support-file caching, LocalDevVPN launch, device preparation, and retained-session verification" \
            "- Only two guided system actions remain: turn Airplane Mode on, then off, while keeping Wi-Fi off" \
            "- One-time SideStore or Files pairing import directly inside the guide" \
            "- Native MapKit map with live place and address autocomplete" \
            "- Tap or drag the pin, then start or move the simulated location" \
            "- Visual and haptic Start, Move, Stop, and connection-loss feedback" \
            "- Optional background keepalive and cautious watchdog notifications" \
            "" \
            "### Install" \
            "" \
            "1. Download $asset below." \
            "2. Import it into SideStore." \
            "3. Turn Wi-Fi off, leave mobile data on, choose a location, and tap Start on mobile data." \
            "4. Follow Waypoint's prompts to turn Airplane Mode on, then off." \
            "" \
            "The retained-session mechanism was confirmed in Waypoint 0.3.0 on a physical iPhone running iOS 26. The new 0.4.0 guided wrapper still needs physical-device retesting and remains experimental." \
            "" \
            "Waypoint uses Apple's software-simulated developer location. Destination apps can detect or reject it." \
            "" \
            "**SHA-256:** $checksum" \
            > "$notes"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
            gh release edit "$tag" \
              --title "Waypoint $version" \
              --notes-file "$notes" \
              --latest
          else
            gh release create "$tag" "$asset" \
              --target "$GITHUB_SHA" \
              --title "Waypoint $version" \
              --notes-file "$notes" \
              --latest
          fi
