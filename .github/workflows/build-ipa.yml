name: Build unsigned IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish or update the GitHub Release for the app version
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch location-enabled idevice binary
        run: bash scripts/fetch-idevice.sh

      - name: Verify location-simulation symbols
        run: |
          LC_ALL=C grep -a -q '_location_simulation_new' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_set' Vendor/idevice/libidevice_ffi.a
          LC_ALL=C grep -a -q '_location_simulation_clear' Vendor/idevice/libidevice_ffi.a

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive without signing
        run: |
          xcodebuild clean archive \
            -project Waypoint.xcodeproj \
            -scheme Waypoint \
            -configuration Release \
            -archivePath build/Waypoint.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          test -d build/Waypoint.xcarchive/Products/Applications/Waypoint.app
          rm -rf Payload
          mkdir -p Payload
          ditto build/Waypoint.xcarchive/Products/Applications/Waypoint.app Payload/Waypoint.app
          ditto -c -k --sequesterRsrc --keepParent Payload Waypoint-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Waypoint-unsigned-ipa
          path: Waypoint-unsigned.ipa
          retention-days: 30

  release:
    name: publish release
    needs: build
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' &&
          startsWith(github.event.head_commit.message, 'Release Waypoint ')) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out release metadata
        uses: actions/checkout@v4

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: Waypoint-unsigned-ipa

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' project.yml)"
          test -n "$version"

          tag="v$version"
          asset="Waypoint-iOS26-$tag-unsigned.ipa"
          mv Waypoint-unsigned.ipa "$asset"

          checksum="$(sha256sum "$asset" | awk '{ print $1 }')"
          notes="$(mktemp)"
          printf '%s\n' \
            "## Waypoint $version" \
            "" \
            "Unsigned Waypoint IPA. Sign it with a compatible iOS signing method before installation; SideStore is supported but optional." \
            "" \
            "### Included" \
            "" \
            "- Map search with place and address suggestions" \
            "- Tap or drag the pin, then start, move, or stop the simulated location" \
            "- Guided pairing and developer-support setup" \
            "- Recommended Wi-Fi start and experimental cellular-only handoff" \
            "- Optional disconnect notifications and background keepalive" \
            "" \
            "### Install" \
            "" \
            "1. Download $asset below." \
            "2. Sign and install it with SideStore, AltStore Classic/AltServer, or another compatible method." \
            "3. Follow the first-time setup guide: https://github.com/$GITHUB_REPOSITORY#first-time-setup" \
            "" \
            "> [!NOTE]" \
            "> Cellular-only start remains experimental and device-dependent. Starting on Wi-Fi is recommended." \
            "" \
            "Waypoint uses Apple's software-simulated developer location. Apps can detect or reject simulated locations." \
            "" \
            "SHA-256: $checksum" \
            > "$notes"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
            gh release edit "$tag" \
              --title "Waypoint $version" \
              --notes-file "$notes" \
              --latest
          else
            gh release create "$tag" "$asset" \
              --target "$GITHUB_SHA" \
              --title "Waypoint $version" \
              --notes-file "$notes" \
              --latest
          fi
