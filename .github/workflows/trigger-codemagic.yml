name: Trigger Codemagic build
run-name: Codemagic build requested by @${{ github.actor }}

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: codemagic-owner-trigger
  cancel-in-progress: false

jobs:
  reject-unauthorized-request:
    name: Reject unauthorized request
    if: >-
      github.actor != github.repository_owner ||
      github.triggering_actor != github.repository_owner ||
      github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Explain restriction
        run: |
          echo "::error::Only the repository owner can trigger the Codemagic build from main."
          exit 1

  trigger-codemagic:
    name: Queue owner build
    if: >-
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create the Codemagic trigger tag
        run: |
          set -euo pipefail

          # Recreate one fixed tag at the current main commit. Recreating the tag
          # emits a tag-created webhook without adding commits or branches.
          git push origin --delete refs/tags/codemagic-build 2>/dev/null || true
          git tag --force codemagic-build main
          git push origin refs/tags/codemagic-build

          trigger_commit="$(git rev-parse main)"
          {
            echo "### Codemagic webhook triggered"
            echo
            echo "- Workflow: \`waypoint-unsigned\`"
            echo "- Source: current \`main\`"
            echo "- Trigger tag: \`codemagic-build\`"
            echo "- Trigger commit: \`$trigger_commit\`"
          } >> "$GITHUB_STEP_SUMMARY"
