name: Trigger Codemagic build
run-name: Codemagic build requested by @${{ github.actor }}

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: codemagic-owner-trigger
  cancel-in-progress: false

jobs:
  reject-unauthorized-request:
    name: Reject unauthorized request
    if: >-
      github.actor != github.repository_owner ||
      github.triggering_actor != github.repository_owner ||
      github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Explain restriction
        run: |
          echo "::error::Only the repository owner can trigger the Codemagic build from main."
          exit 1

  trigger-codemagic:
    name: Queue owner build
    if: >-
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update the Codemagic trigger branch
        run: |
          set -euo pipefail

          git config user.name "Waypoint GitHub Actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty \
            --message "Trigger Codemagic build from GitHub run $GITHUB_RUN_ID"
          git push --force origin HEAD:refs/heads/codemagic-build

          trigger_commit="$(git rev-parse HEAD)"
          {
            echo "### Codemagic webhook triggered"
            echo
            echo "- Workflow: \`waypoint-unsigned\`"
            echo "- Source: current \`main\`"
            echo "- Trigger branch: \`codemagic-build\`"
            echo "- Trigger commit: \`$trigger_commit\`"
          } >> "$GITHUB_STEP_SUMMARY"
